services:
  postgres:
    image: postgres:16
    container_name: cucinetta-postgres
    environment:
      POSTGRES_USER: cucinetta
      POSTGRES_PASSWORD: cucinetta
      POSTGRES_DB: cucinetta
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
